<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Portfolio Mockup Generator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: #fff;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        text-align: center;
        margin-bottom: 8px;
    }

    p {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 20px;
    }

    .container {
        background: #161b22;
        width: 100%;
        max-width: 450px;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }

    input {
        flex: 1;
        min-width: 120px;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 8px;
        background: #238636;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 8px;
    }

    button:hover {
        background: #2ea043;
    }

    #portfolio {
        margin-top: 18px;
    }

    .card {
        background: #0e4429;
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 12px;
    }

    .token {
        font-size: 20px;
        font-weight: bold;
    }

    .amount {
        opacity: 0.85;
        margin-top: 4px;
        font-size: 16px;
    }

    #downloadBtn {
        background: #8250df;
        margin-top: 15px;
    }

    #downloadBtn:hover {
        background: #9966ff;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
        .container {
            padding: 15px;
        }
        input, button {
            font-size: 15px;
        }
        .token {
            font-size: 18px;
        }
        .amount {
            font-size: 15px;
        }
    }
</style>
</head>

<body>
<h1>Crypto Portfolio Generator</h1>
<p>Create portfolio cards and download them as an image.</p>

<div class="container" id="capture-area">

    <div class="input-row">
        <input id="token" type="text" placeholder="Token (e.g., SOL)">
        <input id="amount" type="number" placeholder="Amount">
    </div>

    <button onclick="addToken()">Add Token</button>

    <div id="portfolio"></div>

    <button id="downloadBtn" onclick="downloadImage()">Download PNG</button>
</div>

<!-- HTML2Canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function addToken() {
    let token = document.getElementById("token").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if (!token || !amount) return alert("Please fill both fields.");

    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <div class="token">${token.toUpperCase()}</div>
        <div class="amount">${amount}</div>
    `;

    document.getElementById("portfolio").appendChild(card);

    document.getElementById("token").value = "";
    document.getElementById("amount").value = "";
}

function downloadImage() {
    const captureArea = document.getElementById("capture-area");

    html2canvas(captureArea, { scale: 2 }).then(canvas => {
        const link = document.createElement("a");
        link.download = "portfolio.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
